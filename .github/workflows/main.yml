name: Check for Updates
on:
  schedule:
    - cron: '*/5 * * * *' # Cứ 5 phút kiểm tra 1 lần
  workflow_dispatch: # Để cậu có thể nhấn nút chạy bằng tay
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'
      - name: Install dependencies
        run: npm install
      - name: Run Tracker
        run: node index.js
